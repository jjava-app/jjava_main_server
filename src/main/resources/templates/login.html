<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>짜바 관리자 페이지</title>
    <link rel="stylesheet" href="../static/admin/login.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="inner">
        <figure>
          <img src="../static/admin/logo.svg" alt="짜바 앱 로고" />
        </figure>

        <form id="login-form" class="login_form">
          <div class="field">
            <label for="username">아이디</label>
            <input
              id="username"
              name="username"
              type="text"
              autocomplete="username"
              required
            />
          </div>

          <div class="field">
            <label for="password">비밀번호</label>
            <input
              id="password"
              name="password"
              type="password"
              autocomplete="current-password"
              required
            />
          </div>

          <button type="submit">로그인</button>
        </form>
      </div>
    </div>
  </body>
</html>
